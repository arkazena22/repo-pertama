<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo GitHub Pages</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 40px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: #2980b9;
        }

        .card {
            margin: 20px auto;
            padding: 20px;
            background: white;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            background: #ddd;
        }
    </style>
</head>

<body>

<header>
    <h1>Demo GitHub Pages</h1>
    <p>Demo Web Sederhana Melalui GitHub Pages</p>
</header>

<main>
    <div class="card">
        <h2>Halo Guys 👋</h2>
        <p>Ini contoh web statis yang di-deploy menggunakan GitHub Pages.</p>

        <button onclick="ubahTeks()">Klik</button>

        <p id="output" style="margin-top:20px;"></p>
    </div>
</main>

<footer>
    <p>© 2026 - Dibuat untuk pembelajaran</p>
</footer>

<script>
    function ubahTeks() {
        document.getElementById("output").innerHTML = "Deployment berhasil!";
    }
</script>

</body>
</html>
